# Ustawienie przezroczystości (0.0 to pełna przezroczystość, 1.0 to brak)
background_opacity 0.6

# Opcjonalnie: wyłączenie rozmycia tła (zależy od systemu operacyjnego/menedżera okien)
# background_blur 1





# Włącza ślad kursora (wartość to długość śladu)
cursor_trail 1

cursor_trail_decay 0.05 0.3

# Próg startowy - 0 oznacza, że animacja dzieje się przy każdym ruchu
cursor_trail_start_threshold 0

# Kształt kursora (najlepiej wygląda jako blok)
cursor_shape block

# Wyłączenie integracji powłoki dla kursora (opcjonalne, zapobiega zmianie kształtu przez shell)
shell_integration no-cursor




# Nazwa czcionki (musi być zainstalowana w systemie)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Rozmiar czcionki (zwiększ tę wartość według uznania)
font_size 14.0




# Odstępy (opcjonalnie, sprawia że terminal wygląda czyściej)
window_padding_width 10
